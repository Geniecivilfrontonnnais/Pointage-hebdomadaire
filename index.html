<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCF – Pointage hebdomadaire</title>
<style>
:root{
  --bg:#f5f2ed; --card:#fff; --line:#d8d2ca; --ink:#1c1917; --muted:#78716c;
  --green:#1A3A2A; --orange:#C8400A;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,sans-serif}
.top{position:sticky;top:0;background:var(--green);color:#fff;padding:14px 16px;z-index:10}
.top h1{font-size:18px;margin:0}
.wrap{max-width:1100px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
label{font-weight:bold;font-size:13px;margin-bottom:5px;display:block}
select,input,textarea,button{font:inherit}
select,input,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff}
textarea{min-height:110px;resize:vertical}
button{border:0;border-radius:12px;padding:11px 14px;font-weight:bold;cursor:pointer}

.dayBox{display:flex;flex-direction:column;gap:4px}
.dayLabel{font-weight:bold;font-size:12px;text-align:center;color:var(--muted)}


.dayTable{
  display:flex;
  flex-direction:column;
  gap:4px;
  width:100%;
}

.dayHead,
.dayLine{
  display:grid;
  grid-template-columns:18px 1fr 1fr 1fr;
  gap:3px;
  align-items:center;
}

.dayHead{
  font-size:9px;
  color:var(--muted);
  font-weight:bold;
}

.dayLetter{
  font-size:11px;
  font-weight:bold;
  text-align:center;
}

.dayTable select{
  padding:4px;
  font-size:10px;
}



.btn{background:var(--green);color:#fff}
.btn-red{background:var(--orange);color:#fff}
.btn-light{background:#eee;color:#1c1917}
.row{display:grid;grid-template-columns:180px repeat(5,260px) 70px 50px;gap:6px;align-items:end;margin-bottom:8px}
.row.header{font-weight:bold;font-size:12px;color:var(--muted);align-items:center}
.small{text-align:center}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.note{font-size:12px;color:var(--muted)}
.printSheet{display:none;background:#fff;color:#000;padding:12mm}
.previewWrap{
  display:none;
  max-width:1100px;
  margin:0 auto 20px;
  padding:0 14px;
  overflow-x:auto;
}
.previewWrap.previewOn{
  display:block;
}
.previewWrap .printSheet{
  display:block;
  width:297mm;
  min-height:210mm;
  margin:0 auto 20px;
  border:1px solid var(--line);
  border-radius:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  transform-origin:top center;
}
.noPrint{display:inline-block}
@media(max-width:1100px){
  .previewWrap .printSheet{
    transform:scale(.62);
    margin-bottom:-65mm;
  }
}
@media(max-width:700px){
  .previewWrap .printSheet{
    transform:scale(.38);
    margin-bottom:-115mm;
  }
}
@media print{
  .previewWrap{display:block;max-width:none;margin:0;padding:0;overflow:visible}
  .noPrint{display:none !important}
  .previewWrap .printSheet{
    width:auto;
    min-height:auto;
    border:0;
    box-shadow:none;
    border-radius:0;
    transform:none;
    margin:0;
  }
}

.printHead{display:grid;grid-template-columns:180px 1fr;gap:10px;margin-bottom:10px;align-items:start}
.logo{font-size:28px;font-weight:bold;letter-spacing:4px;line-height:1.05}
.meta{border:1px solid #000;border-collapse:collapse;width:100%}
.meta td{border:1px solid #000;padding:6px;font-size:12px}
.pointage{border-collapse:collapse;width:100%;font-size:11px}
.pointage th,.pointage td{border:1px solid #000;padding:4px;text-align:center;height:24px}
.pointage th:first-child,.pointage td:first-child{text-align:left;width:170px}
.real{margin-top:10px;border:1px solid #000;min-height:115px;padding:6px;font-size:12px;white-space:pre-wrap}
@media(max-width:850px){
  .grid{grid-template-columns:1fr}
  .row{grid-template-columns:1fr}
  .row.header{display:none}
}
@media print{
  body{background:#fff}
  .top,.wrap{display:none}
  .printSheet{display:block}
  @page{size:A4 landscape;margin:8mm}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<header class="top"><h1>GCF – Pointage hebdomadaire</h1></header>

<main class="wrap">
  <section class="card">
    <div class="grid">
      <div>
        <label for="chantier">Chantier</label>
        <input id="chantier" list="chantierList" autocomplete="off" placeholder="Choisir ou saisir une affaire">
        <datalist id="chantierList"></datalist>
      </div>
      <div>
        <label for="chef">Chef de chantier</label>
        <input id="chef" list="salarieList" autocomplete="off" placeholder="Choisir ou saisir un chef">
        <datalist id="salarieList"></datalist>
      </div>
      <div>
        <label for="semaine">N° de semaine</label>
        <select id="semaine"></select>
      </div>
    </div>
    <p class="note">Les listes salariés et chantiers sont modifiables dans les tableaux <b>SALARIES</b> et <b>CHANTIERS</b> au début du fichier HTML.</p>
  </section>

  <section class="card">
    <h2 style="font-size:16px;margin-top:0">Salariés présents sur chantier</h2>
    <div class="row header">
      <div>Personnel</div><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div>
      <div>Total</div><div></div>
    </div>
    <div id="rows"></div>
    <div class="actions">
      <button class="btn" onclick="addRow()">+ Ajouter un salarié</button>
      <button class="btn-light" onclick="clearRows()">Réinitialiser les lignes</button>
    </div>
  </section>

  <section class="card">
    <label for="realisations">Réalisations de la semaine</label>
    <textarea id="realisations" placeholder="Exemple : terrassement, pose de fourreaux, coffrage, bétonnage, nettoyage chantier..."></textarea>
  </section>

  <section class="card actions">
    <button class="btn-red" onclick="generatePDF()">Générer le PDF</button>
    <button class="btn" onclick="showPreview()">Prévisualiser le document</button>
  </section>
</main>

<div id="previewWrap" class="previewWrap">
<section id="printSheet" class="printSheet">
  <button id="hidePreviewBtn" class="btn-light noPrint" onclick="hidePreview()" style="margin-bottom:10px;display:none">Masquer la prévisualisation</button>
  <div class="printHead">

function weekNumber(d){
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

  const el = document.getElementById("semaine");

    opt.textContent = "Semaine " + i;
    el.appendChild(opt);
  }
}

function employeeSelect(){
  const input = document.createElement("input");
  input.setAttribute("list", "salarieList");
  input.autocomplete = "off";
  input.placeholder = "Choisir ou saisir un salarié";
  input.className = "employeeName";
  return input;
}

function createHourSelect(){
  const select = document.createElement("select");
  select.className = "small hourSelect";

  const empty = document.createElement("option");
  empty.value = "0";
  empty.textContent = "-";
  select.appendChild(empty);

  for(let h=9; h>=0.5; h-=0.5){
    const opt = document.createElement("option");
    opt.value = String(h);
    opt.textContent = String(h).replace(".", ",");
    select.appendChild(opt);
  }

  select.addEventListener("change", updateTotals);
  return select;
}

function addRow(){
  const container = document.getElementById("rows");
  const r = document.createElement("div");
  r.className = "row empRow";

  const name = employeeSelect();
  const dayLetters = ["L","M","M","J","V"];
  const days = dayLetters.map(letter => {
    const box = document.createElement("div");
    box.className = "dayBox";

    const table = document.createElement("div");
    table.className = "dayTable";

    const head = document.createElement("div");
    head.className = "dayHead";
    head.innerHTML = "<div></div><div>Travaillé</div><div>Absence</div><div>Intempéries</div>";

    const line = document.createElement("div");
    line.className = "dayLine";

    const day = document.createElement("div");
    day.className = "dayLetter";
    day.textContent = letter;

    const trav = createHourSelect();
    trav.classList.add("trav");

    const abs = createHourSelect();
    abs.classList.add("abs");

    const intemp = createHourSelect();
    intemp.classList.add("int");

    line.append(day, trav, abs, intemp);

    table.append(head, line);
    box.append(table);

    return box;
  });

  const total = document.createElement("input");
  total.type = "text";
  total.readOnly = true;
  total.className = "small total";

  const del = document.createElement("button");
  del.textContent = "×";
  del.className = "btn-red";
  del.onclick = () => { r.remove(); buildPrint(); };

  r.append(name, ...days, total, del);
  container.appendChild(r);

  const rows = document.querySelectorAll(".empRow");
  if(rows.length > 1){
    const firstRow = rows[0];
    const newRow = r;

    const firstDays = firstRow.querySelectorAll(".dayBox");
    const newDays = newRow.querySelectorAll(".dayBox");

    newDays.forEach((day, index) => {
      const sourceDay = firstDays[index];
      if(!sourceDay) return;

      day.querySelector(".trav").value = sourceDay.querySelector(".trav").value;
      day.querySelector(".abs").value = sourceDay.querySelector(".abs").value;
      day.querySelector(".int").value = sourceDay.querySelector(".int").value;
    });

    updateTotals();
  }
}

function clearRows(){
  document.getElementById("rows").innerHTML = "";

}

function parseHours(v){
  if(!v) return 0;
  v = String(v).replace(",", ".").trim().toUpperCase();
  if(v.includes("ABS") || v.includes("INT")) return 0;
  const n = Number(v);
  return isNaN(n) ? 0 : n;
}

function updateTotals(){
  document.querySelectorAll(".empRow").forEach(r => {
    let sum = 0;

    r.querySelectorAll(".dayBox").forEach(day => {
      const t = Number(day.querySelector(".trav").value || 0);
      const a = Number(day.querySelector(".abs").value || 0);
      const i = Number(day.querySelector(".int").value || 0);
      sum += t + a + i;
    });

    r.querySelector(".total").value = sum ? sum.toString().replace(".", ",") : "";
  });
}

      const parts = [];

      if(Number(t) > 0){
        parts.push(t.replace(".", ",") + "h");
      }

      if(Number(a) > 0){
        parts.push(a.replace(".", ",") + "h Abs");
      }

      if(Number(i) > 0){
        parts.push(i.replace(".", ",") + "h Int");
      }

      return parts.join(" / ");
    });
    const total = r.querySelector(".total").value;
    cells.push(name, ...dayVals, total);

    const tr = document.createElement("tr");
    cells.forEach(v => {
      const td = document.createElement("td");
      td.textContent = v;
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });

  for(let i = body.children.length; i < 13; i++){
    const tr = document.createElement("tr");
    for(let j=0;j<7;j++){
      const td = document.createElement("td");
      td.innerHTML = "&nbsp;";
      tr.appendChild(td);
    }
    body.appendChild(tr);
  }
}



async function generatePDF(){
  buildPrint();

  const original = document.getElementById("printSheet");

  const clone = original.cloneNode(true);
  clone.id = "pdfSheetClone";

  const btn = clone.querySelector("#hidePreviewBtn");
  if(btn) btn.remove();

  clone.style.display = "block";
  clone.style.position = "fixed";
  clone.style.left = "-10000px";
  clone.style.top = "0";
  clone.style.width = "297mm";
  clone.style.minHeight = "210mm";
  clone.style.margin = "0";
  clone.style.padding = "12mm";
  clone.style.border = "0";
  clone.style.boxShadow = "none";
  clone.style.borderRadius = "0";
  clone.style.transform = "none";
  clone.style.background = "#ffffff";
  clone.style.color = "#000000";
  clone.style.boxSizing = "border-box";

  document.body.appendChild(clone);

  await new Promise(resolve => setTimeout(resolve, 50));

  const canvas = await html2canvas(clone, {
    scale: 2,
    backgroundColor: "#ffffff",
    useCORS: true,
    scrollX: 0,
    scrollY: 0,
    windowWidth: clone.scrollWidth,
    windowHeight: clone.scrollHeight
  });

  document.body.removeChild(clone);

  const imgData = canvas.toDataURL("image/jpeg", 0.98);
  const { jsPDF } = window.jspdf;

  const pdf = new jsPDF({
    orientation: "landscape",
    unit: "mm",
    format: "a4"
  });

  pdf.addImage(imgData, "JPEG", 0, 0, 297, 210);

  const semaine = document.getElementById("semaine").value || "";
  const annee = new Date().getFullYear();
  pdf.save("Pointage S" + semaine + " " + annee + ".pdf");
}

function showPreview(){
  buildPrint();

  const wrap = document.getElementById("previewWrap");
  wrap.classList.add("previewOn");

  document.getElementById("hidePreviewBtn").style.display = "inline-block";

  wrap.scrollIntoView({behavior:"smooth", block:"start"});

  setTimeout(() => {
    wrap.scrollLeft = (wrap.scrollWidth - wrap.clientWidth) / 2;
  }, 100);
}

function hidePreview(){
  const wrap = document.getElementById("previewWrap");
  wrap.classList.remove("previewOn");
  document.getElementById("hidePreviewBtn").style.display = "none";
}

window.addEventListener("DOMContentLoaded", () => {
  fillDatalist("chantierList", CHANTIERS);
  fillDatalist("salarieList", SALARIES);
  fillWeeks();
  document.getElementById("semaine").value = weekNumber(new Date());
  addRow();
});
